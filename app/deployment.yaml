apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-inference
  namespace: ai-demo
  labels:
    app: gpu-inference
    app.kubernetes.io/part-of: gke-gpu-ai-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-inference
  template:
    metadata:
      labels:
        app: gpu-inference
      annotations: {}
    spec:
      containers:
        - name: inference
          # Replace with your Artifact Registry path after building:
          # e.g. us-central1-docker.pkg.dev/PROJECT_ID/ai-demo/gpu-inference:latest
          image: REGISTRY/gpu-inference:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVICE_NAME
              value: "gpu-inference-demo"
            - name: MODEL_NAME
              value: "demo-llm-7b"
            - name: OTEL_SERVICE_NAME
              value: "gpu-inference-demo"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "GRAFANA_CLOUD_OTLP_URL_PLACEHOLDER"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: "GRAFANA_CLOUD_OTLP_AUTH_PLACEHOLDER"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OPENLIT_COLLECT_GPU_STATS
              value: "true"
            - name: LD_LIBRARY_PATH
              value: "/usr/local/nvidia/lib64:/usr/local/cuda/lib64"
            # Grafana Sigil SDK — structured LLM generation telemetry
            - name: SIGIL_ENDPOINT
              value: "SIGIL_ENDPOINT_PLACEHOLDER"
            - name: SIGIL_AUTH_TENANT_ID
              value: "SIGIL_TENANT_ID_PLACEHOLDER"
            - name: SIGIL_AUTH_TOKEN
              value: "SIGIL_TOKEN_PLACEHOLDER"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
